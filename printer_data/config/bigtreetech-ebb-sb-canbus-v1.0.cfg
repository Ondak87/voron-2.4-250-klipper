[fan]
pin: EBBCan:PA1
kick_start_time: 0.5
off_below: 0.10

[heater_fan hotend_fan]
pin: EBBCan:PA0
tachometer_pin: ^EBBCan: PB15
tachometer_ppr: 1
tachometer_poll_interval: 0.00015
hardware_pwm: false
heater: extruder
heater_temp: 50.0
#heater_temp: 100           # kalibrace Kalibrace posunu teploty cívky
max_power: 1.0
kick_start_time: 0.5
fan_speed: 1.0


