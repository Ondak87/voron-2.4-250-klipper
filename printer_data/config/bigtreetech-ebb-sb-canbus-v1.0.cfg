# This file contains common pin mappings for the BIGTREETECH EBBCan
# Canbus board. To use this config, the firmware should be compiled for the
# STM32G0B1 with "8 MHz crystal" and "USB (on PA11/PA12)" or "CAN bus (on PB0/PB1)".
# The "EBB Can" micro-controller will be used to control the components on the nozzle.

# See docs/Config_Reference.md for a description of parameters.

#####################################################################
#     FAN - Tacho
#####################################################################

[include fan_tach_monitor.cfg]


#####################################################################

[mcu EBBCan]
#serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_30004C000A50425539393020-if00
canbus_uuid: 9aad898e6831

[temperature_sensor EBB_extruder]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan:PA3

[temperature_sensor EBB_NTC_SB2209]
sensor_type: Generic 3950
sensor_pin: EBBCan: PA2

#####################################################################
#   Extruder EBB SB2209
#####################################################################
[extruder]
step_pin: EBBCan: PD0
dir_pin: EBBCan: PD1                 #Galileo 2
enable_pin: !EBBCan: PD2
#rotation_distance: 19   #Bondtech 5mm Drive Gears
#rotation_distance: 22.67895   #Bondtech 5mm Drive Gears - CW2
#gear_ratio: 50:10               #BMG Gear Ratio - CW2
rotation_distance: 47.088       # Galileo 2
gear_ratio: 9:1                 # Galileo 2
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
#sensor_type: NTC 100K MGB18-104F39050L32       #EPCOS 100K B57560G104F
#sensor_type: ATC Semitec 104GT-2
#sensor_type: Generic 3950
#sensor_pin: EBBCan:PA3
#pullup_resistor: 2200
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
#max_power: 1.0
min_extrude_temp: 170
#max_extrude_only_distance: 600
max_extrude_only_distance: 101
max_extrude_cross_section: 50 #0.8
pressure_advance: 0.01
pressure_advance_smooth_time: 0.040

sensor_type:MAX31865
sensor_pin: EBBCan: PA4
spi_bus: spi1
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2


##  E0 on MOTOR6
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder]
uart_pin: EBBCan: PA15
#run_current: 0.650
run_current: 0.6
hold_current: 0.2
sense_resistor: 0.110
stealthchop_threshold: 999999
interpolate: False


#[filament_switch_sensor toolhead_sensor]
#switch_pin: ^EBBCan: PB5

#[filament_switch_sensor extruder_switch_pin]
#switch_pin: ^EBBCan: PB6

#[adxl345]
